name: Daily outdoor weather email

on:
  schedule:
    # Run hourly; the script sends only at DAILY_EMAIL_HOUR in Washington, DC time.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send regardless of current local hour"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send DC outdoor weather email
        env:
          FORCE_SEND: ${{ github.event.inputs.force_send }}
          DAILY_EMAIL_HOUR: ${{ vars.DAILY_EMAIL_HOUR }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python capitol-hill-weather-dashboard/scripts/daily_email.py
